<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- background pill -->
  <rect width="32" height="32" rx="8" fill="#0b1325"/>
  <!-- dev branch node (top) -->
  <circle cx="4" cy="9" r="3" fill="#00d4ff"/>
  <!-- main branch node (bottom) -->
  <circle cx="4" cy="23" r="3" fill="#00d4ff"/>
  <!-- dev → merge line -->
  <path d="M7 9.8 L18 15.4" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <!-- main → merge line -->
  <path d="M7 22.2 L18 16.6" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <!-- merge node -->
  <circle cx="20" cy="16" r="3.5" fill="#00e676"/>
  <!-- deploy arrow shaft -->
  <path d="M23.5 16 L28 16" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>
  <!-- arrowhead -->
  <path d="M25.5 12.5 L29.5 16 L25.5 19.5" fill="none" stroke="#00e676" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
